name: CodeRabbit Approval Handler

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  dispatch-coderabbit-approval:
    if: ${{ github.repository_owner == 'AOSSIE-Org' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event when CodeRabbit approves
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const review = context.payload.review;
            const reviewer = review?.user?.login || '';
            const state = review?.state || '';

            console.log(`PR number: ${prNumber}`);
            console.log(`Reviewer: ${reviewer}`);
            console.log(`Review state: ${state}`);

            const isCodeRabbit = reviewer === 'coderabbitai' || reviewer === 'coderabbitai[bot]';
            const isApproved = state === 'approved';

            if (!isCodeRabbit || !isApproved) {
              console.log('Not a CodeRabbit approval review. No dispatch will be sent.');
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'coderabbit_approved',
              client_payload: {
                pr_number: prNumber,
                reviewer,
                review_state: state
              }
            });

            console.log(`✅ Dispatched 'coderabbit_approved' event for PR #${prNumber}`);
